  <path d="M12 10a12 12 0 0 1 16 0" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M14.5 13a8 8 0 0 1 11 0" stroke="white" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.6"/>
  <!-- Device nodes -->
  <circle cx="10" cy="27" r="3" fill="white" opacity="0.9"/>
  <circle cx="30" cy="27" r="3" fill="white" opacity="0.9"/>
  <circle cx="20" cy="33" r="3" fill="white" opacity="0.9"/>
  <!-- Connection lines -->
  <line x1="20" y1="20" x2="10" y2="24" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <line x1="20" y1="20" x2="30" y2="24" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <line x1="20" y1="20" x2="20" y2="30" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <!-- Interconnect nodes -->
  <line x1="12.5" y1="27" x2="17.5" y2="33" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="27.5" y1="27" x2="22.5" y2="33" stroke="white" stroke-width="1" opacity="0.3"/>
</svg>
